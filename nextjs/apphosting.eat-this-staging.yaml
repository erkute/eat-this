runConfig:
  runtime: nodejs20
  maxInstances: 10
  minInstances: 0
  concurrency: 80
  # Matches prod — see apphosting.yaml for rationale.
  timeoutSeconds: 120

# Per-backend override for `eat-this-staging`. App Hosting reads this file
# INSTEAD of apphosting.yaml when deploying this backend. Keep most envs
# identical to prod (shared Firebase project, shared Sanity, shared
# Resend/recaptcha), but flip the env flag, Stripe secrets, and add the
# Basic Auth gate credentials.
env:
  # ENV FLAG — flips the app into staging mode (Basic Auth, banner, robots
  # disallow, empty sitemap, etc.).
  - variable: NEXT_PUBLIC_ENV
    value: staging
    availability:
      - BUILD
      - RUNTIME

  # Basic Auth credentials — gates every non-webhook request on staging.
  - variable: STAGING_BASIC_AUTH_USER
    secret: STAGING_BASIC_AUTH_USER
    availability:
      - RUNTIME
  - variable: STAGING_BASIC_AUTH_PASS
    secret: STAGING_BASIC_AUTH_PASS
    availability:
      - RUNTIME

  - variable: SANITY_REVALIDATE_SECRET
    secret: SANITY_REVALIDATE_SECRET
    availability:
      - RUNTIME

  # Resend — same secrets as prod. Staging will currently send real emails;
  # Plan 2 codifies the staging gate inside lib/resend.ts.
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY
    availability:
      - RUNTIME
  - variable: RESEND_FROM_EMAIL
    value: hello@eatthisdot.com
    availability:
      - RUNTIME
  - variable: RESEND_FROM_NAME
    value: Eat This
    availability:
      - RUNTIME
  - variable: RESEND_LAUNCH_SEGMENT_ID
    secret: RESEND_LAUNCH_SEGMENT_ID
    availability:
      - RUNTIME

  - variable: LAUNCH_CONFIRM_SECRET
    secret: LAUNCH_CONFIRM_SECRET
    availability:
      - RUNTIME

  # reCAPTCHA Enterprise — same site-key as prod. Stripe-test signups in
  # staging will still run the score-based bot check.
  - variable: NEXT_PUBLIC_RECAPTCHA_SITE_KEY
    value: 6LcHwv0sAAAAAOYhCmKATrUoLMUS3XrC6pwMoR5u
    availability:
      - RUNTIME
      - BUILD
  - variable: RECAPTCHA_PROJECT_ID
    value: eat-this-8a13b
    availability:
      - RUNTIME
  - variable: RECAPTCHA_API_KEY
    secret: RECAPTCHA_API_KEY
    availability:
      - RUNTIME

  # Firebase Admin — same secrets, shared Firebase project.
  - variable: FIREBASE_ADMIN_PROJECT_ID
    value: eat-this-8a13b
    availability:
      - RUNTIME
  - variable: FIREBASE_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_ADMIN_CLIENT_EMAIL
    availability:
      - RUNTIME
  - variable: FIREBASE_ADMIN_PRIVATE_KEY
    secret: FIREBASE_ADMIN_PRIVATE_KEY
    availability:
      - RUNTIME

  - variable: ADMIN_EMAILS
    value: dirtyersan@gmail.com
    availability:
      - RUNTIME

  # Public URL — points at the STAGING host, not prod. Used by email
  # generators and absolute-URL builders.
  - variable: NEXT_PUBLIC_APP_URL
    value: https://eat-this-staging--eat-this-8a13b.us-central1.hosted.app
    availability:
      - RUNTIME
      - BUILD

  # Sentry — same DSN, errors from both backends land in the same project.
  # Plan 2 may add a `environment` tag in client init to separate them.
  - variable: NEXT_PUBLIC_SENTRY_DSN
    value: https://8263bedea4ad73eab1d9c910ab4247eb@o4511200513818624.ingest.de.sentry.io/4511200529285200
    availability:
      - RUNTIME
      - BUILD
  - variable: SENTRY_ORG
    value: eat-this
    availability:
      - BUILD
  - variable: SENTRY_PROJECT
    value: javascript
    availability:
      - BUILD
  - variable: SENTRY_AUTH_TOKEN
    secret: SENTRY_AUTH_TOKEN
    availability:
      - BUILD

  # Import pipeline — shared secrets. Staging has no SANITY_API_WRITE_TOKEN
  # so /api/admin/import-restaurant 401s here (intentional — content imports
  # only happen against prod).
  - variable: IMPORT_SECRET
    secret: IMPORT_SECRET
    availability:
      - RUNTIME
  - variable: GOOGLE_API_KEY
    secret: GOOGLE_API_KEY
    availability:
      - RUNTIME
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
    availability:
      - RUNTIME
  - variable: SANITY_API_WRITE_TOKEN
    secret: SANITY_API_WRITE_TOKEN
    availability:
      - RUNTIME

  # Stripe — staging uses TEST-mode keys + a separate webhook endpoint.
  # Test cards `4242 4242 4242 4242` work here; no real charges.
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY_STAGING
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET_STAGING
    availability:
      - RUNTIME
