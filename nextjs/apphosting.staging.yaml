# Per-environment override for the "staging" environment. Firebase App
# Hosting picks this file when the backend's Environment name is set to
# "staging" (Console → Backend → Settings → Environment).
#
# Values defined here are MERGED on top of apphosting.yaml — only the
# variables that differ from prod need to appear here.
env:
  # ENV FLAG — flips the app into staging mode (Basic Auth, banner, robots
  # disallow, empty sitemap, etc.).
  - variable: NEXT_PUBLIC_ENV
    value: staging
    availability:
      - BUILD
      - RUNTIME

  # A separate Sanity project/dataset. The project ID is kept in Secret
  # Manager so this file remains reusable until the external project exists.
  - variable: SANITY_PROJECT_ID
    secret: SANITY_PROJECT_ID_STAGING
    availability:
      - BUILD
      - RUNTIME
  - variable: SANITY_DATASET
    value: staging
    availability:
      - BUILD
      - RUNTIME
  - variable: SANITY_API_READ_TOKEN
    secret: SANITY_API_READ_TOKEN_STAGING
    availability:
      - BUILD
      - RUNTIME
  - variable: SANITY_REVALIDATE_SECRET
    secret: SANITY_REVALIDATE_SECRET_STAGING
    availability:
      - RUNTIME

  # Both SDKs reject a missing/mismatched project and explicitly reject the
  # production project ID. This value is public by nature but stays a Secret
  # Manager reference until the immutable staging project ID is chosen.
  - variable: FIREBASE_EXPECTED_PROJECT_ID
    secret: FIREBASE_PROJECT_ID_STAGING
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_EXPECTED_PROJECT_ID
    secret: FIREBASE_PROJECT_ID_STAGING
    availability:
      - BUILD
      - RUNTIME

  # Basic Auth credentials — gates every non-webhook request on staging.
  - variable: STAGING_BASIC_AUTH_USER
    secret: STAGING_BASIC_AUTH_USER
    availability:
      - RUNTIME
  - variable: STAGING_BASIC_AUTH_PASS
    secret: STAGING_BASIC_AUTH_PASS
    availability:
      - RUNTIME

  # Public URL override — emails + absolute-URL builders point at staging.
  - variable: NEXT_PUBLIC_APP_URL
    secret: NEXT_PUBLIC_APP_URL_STAGING
    availability:
      - RUNTIME
      - BUILD

  # Provider credentials are intentionally separate even though this backend
  # also lives in a different Firebase project. A missing staging credential
  # must fail the rollout instead of inheriting production access.
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY_STAGING
    availability:
      - RUNTIME
  - variable: RESEND_FROM_EMAIL
    secret: RESEND_FROM_EMAIL_STAGING
    availability:
      - RUNTIME
  - variable: STAGING_EMAIL_RECIPIENT
    secret: STAGING_EMAIL_RECIPIENT
    availability:
      - RUNTIME
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY_STAGING
    availability:
      - RUNTIME
  - variable: GOOGLE_API_KEY
    # The live importer is hard-404 on staging. Override the production secret
    # reference with a non-credential value so staging cannot inherit provider
    # access and does not require an unused secret.
    value: disabled-in-staging
    availability:
      - RUNTIME
  - variable: VOYAGE_API_KEY
    secret: VOYAGE_API_KEY_STAGING
    availability:
      - RUNTIME
  - variable: BUDDY_IP_SALT
    secret: BUDDY_IP_SALT_STAGING
    availability:
      - RUNTIME
  - variable: PREMIUM_ACCESS_SIGNING_KEY
    secret: PREMIUM_ACCESS_SIGNING_KEY_STAGING
    availability:
      - RUNTIME
  - variable: ADMIN_EMAILS
    secret: ADMIN_EMAILS_STAGING
    availability:
      - RUNTIME
  - variable: NEXT_PUBLIC_SENTRY_DSN
    secret: NEXT_PUBLIC_SENTRY_DSN_STAGING
    availability:
      - BUILD
      - RUNTIME
  - variable: SENTRY_AUTH_TOKEN
    secret: SENTRY_AUTH_TOKEN_STAGING
    availability:
      - BUILD
  - variable: SENTRY_PROJECT
    value: javascript-staging
    availability:
      - BUILD

  # Stripe — staging uses TEST-mode keys + a separate webhook endpoint.
  # Same variable names as prod (so app code is identical), different
  # secret references.
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY_STAGING
    availability:
      - RUNTIME
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET_STAGING
    availability:
      - RUNTIME
