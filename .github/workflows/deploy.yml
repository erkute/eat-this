name: Deploy Firebase Functions

# Main site (www.eatthisdot.com) is deployed by Firebase App Hosting on every
# push to main. This workflow only handles Cloud Functions (auth emails,
# newsletter, Sanity webhook) which App Hosting does not cover.

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy.yml'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

concurrency:
  group: firebase-functions-deploy
  cancel-in-progress: true

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Functions
        run: firebase deploy --only functions --project eat-this-8a13b --non-interactive --force --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
