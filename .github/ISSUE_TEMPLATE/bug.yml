name: Bug
description: A defect — something behaves incorrectly.
labels: ["bug"]
body:
  - type: input
    id: where
    attributes:
      label: Where
      description: URL or file path where the bug shows up
      placeholder: "https://www.eatthisdot.com/restaurant/foo OR nextjs/lib/foo.ts"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs (if relevant)
