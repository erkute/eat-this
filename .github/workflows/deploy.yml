name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: true

jobs:
  lint-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies (ESLint)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Functions dependencies
        run: npm ci
        working-directory: functions

      - name: Deploy Hosting + Functions
        run: npx firebase deploy --only hosting,functions --project eat-this-8a13b --non-interactive --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
