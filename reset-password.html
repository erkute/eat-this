<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="Setze dein Passwort für EAT THIS zurück. Sicher und schnell dein Konto wieder einsatzbereit.">
  <title>Neues Passwort — EAT THIS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      color: #000;
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
    }

    .logo {
      display: block;
      width: 56px;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }

    p.sub {
      font-size: 0.875rem;
      color: #666;
      text-align: center;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }

    input:focus { border-color: #000; }

    .error {
      font-size: 0.82rem;
      color: #c00;
      margin: 6px 0 8px;
      display: none;
    }

    .success {
      font-size: 0.9rem;
      color: #1a7a1a;
      text-align: center;
      margin: 12px 0;
      display: none;
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity .15s;
    }

    button[type="submit"]:hover { opacity: 0.85; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .back {
      display: block;
      text-align: center;
      margin-top: 18px;
      font-size: 0.85rem;
      color: #888;
      text-decoration: none;
    }

    .back:hover { color: #000; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="pics/logo2.webp" alt="EAT THIS" width="120" height="60">
    <h1 id="title">Neues Passwort</h1>
    <p class="sub" id="subtitle">Gib dein neues Passwort ein.</p>

    <form id="resetForm">
      <div class="field">
        <input type="password" id="newPassword" placeholder="Neues Passwort" minlength="6" required autocomplete="new-password">
      </div>
      <div class="field">
        <input type="password" id="confirmPassword" placeholder="Passwort wiederholen" minlength="6" required autocomplete="new-password">
      </div>
      <p class="error" id="errorMsg"></p>
      <button type="submit" id="submitBtn">Passwort speichern</button>
    </form>

    <p class="success" id="successMsg"></p>
    <a class="back" href="/">← Zurück zur App</a>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
    import {
      getAuth,
      confirmPasswordReset,
      verifyPasswordResetCode
    } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyDs0361Db_lwHGW9WZfT5ivj-WIB4fyUw0",
      authDomain:        "eat-this-8a13b.firebaseapp.com",
      projectId:         "eat-this-8a13b",
      storageBucket:     "eat-this-8a13b.firebasestorage.app",
      messagingSenderId: "768781457409",
      appId:             "1:768781457409:web:607ff46bfa4599d6b08800"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const params   = new URLSearchParams(window.location.search);
    const oobCode  = params.get('oobCode');
    const form     = document.getElementById('resetForm');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const submitBtn  = document.getElementById('submitBtn');
    const title      = document.getElementById('title');
    const subtitle   = document.getElementById('subtitle');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function clearError() {
      errorMsg.style.display = 'none';
    }

    // Validate the code on load
    if (!oobCode) {
      title.textContent = 'Ungültiger Link';
      subtitle.textContent = 'Dieser Link ist nicht gültig. Bitte fordere einen neuen an.';
      form.style.display = 'none';
    } else {
      verifyPasswordResetCode(auth, oobCode).catch(() => {
        title.textContent = 'Link abgelaufen';
        subtitle.textContent = 'Dieser Link ist abgelaufen oder wurde bereits verwendet. Bitte fordere einen neuen an.';
        form.style.display = 'none';
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const pw1 = document.getElementById('newPassword').value;
      const pw2 = document.getElementById('confirmPassword').value;

      if (pw1.length < 6) { showError('Passwort muss mindestens 6 Zeichen haben.'); return; }
      if (pw1 !== pw2)    { showError('Passwörter stimmen nicht überein.'); return; }

      submitBtn.disabled = true;
      try {
        await confirmPasswordReset(auth, oobCode, pw1);
        form.style.display = 'none';
        title.textContent = 'Passwort gespeichert!';
        subtitle.textContent = 'Du kannst dich jetzt mit deinem neuen Passwort anmelden.';
        successMsg.textContent = '✓ Passwort erfolgreich geändert.';
        successMsg.style.display = 'block';
      } catch (err) {
        const map = {
          'auth/expired-action-code':  'Link abgelaufen. Bitte fordere einen neuen an.',
          'auth/invalid-action-code':  'Ungültiger Link. Bitte fordere einen neuen an.',
          'auth/user-disabled':        'Dieses Konto wurde deaktiviert.',
          'auth/weak-password':        'Passwort zu schwach (mind. 6 Zeichen).',
        };
        showError(map[err.code] ?? 'Fehler. Bitte erneut versuchen.');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
