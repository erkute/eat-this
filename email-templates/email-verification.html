<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="color-scheme" content="light">
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0a0a0a;">
<tr><td align="center" style="padding:36px 16px 48px;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:520px;">

    <!-- Logo -->
    <tr>
      <td align="center" style="padding-bottom:20px;">
        <a href="https://www.eatthisdot.com" style="text-decoration:none;">
          <img src="https://www.eatthisdot.com/pics/logo.png" alt="EAT THIS" width="52" height="52" style="display:block;width:52px;height:52px;object-fit:contain;border:0;">
        </a>
      </td>
    </tr>

    <!-- Card -->
    <tr>
      <td style="background-color:#ffffff;border-radius:3px;overflow:hidden;">

        <!-- Hero photo -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="padding:0;font-size:0;line-height:0;">
              <img src="https://www.eatthisdot.com/pics/about/0477e049b54b21c5fb7ea43d5a97ac2b.webp" alt="" width="520" style="display:block;width:100%;height:200px;object-fit:cover;object-position:center 30%;border:0;">
            </td>
          </tr>
        </table>

        <!-- Orange line -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr><td style="background-color:#FF3B00;height:3px;font-size:0;line-height:0;">&nbsp;</td></tr>
        </table>

        <!-- Content -->
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="padding:36px 40px 40px;">

              <p style="margin:0 0 10px;font-size:10px;font-weight:700;color:#FF3B00;letter-spacing:3px;text-transform:uppercase;">EAT THIS</p>
              <h1 style="margin:0 0 12px;font-size:32px;font-weight:900;color:#0a0a0a;line-height:1.05;letter-spacing:-1px;">Fast&nbsp;fertig.</h1>
              <p style="margin:0 0 28px;font-size:15px;color:#555;line-height:1.65;">
                Hey %DISPLAY_NAME% — ein Klick noch, dann zeigen wir dir, was du in Berlin essen musst.
              </p>

              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
                <tr><td style="border-top:1px solid #ebebeb;font-size:0;line-height:0;">&nbsp;</td></tr>
              </table>

              <!-- CTA -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom:20px;">
                <tr>
                  <td>
                    <a href="%LINK%" style="display:block;background-color:#0a0a0a;color:#ffffff;text-decoration:none;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:16px 24px;border-radius:2px;">
                      E-Mail bestätigen
                    </a>
                  </td>
                </tr>
              </table>

              <!-- Link fallback -->
              <p style="margin:0;font-size:11px;color:#aaa;text-align:center;line-height:1.7;">
                Kein Button? Kopiere diesen Link in deinen Browser:<br>
                <a href="%LINK%" style="color:#FF3B00;word-break:break-all;text-decoration:none;font-size:11px;">%LINK%</a>
              </p>

              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:24px;margin-bottom:20px;">
                <tr><td style="border-top:1px solid #ebebeb;font-size:0;line-height:0;">&nbsp;</td></tr>
              </table>

              <!-- Note -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr><td style="background-color:#f7f7f7;border:1px solid #ebebeb;border-radius:2px;padding:14px 16px;">
                  <p style="margin:0;font-size:12px;color:#888;line-height:1.7;">Nicht du? Kein Stress — einfach ignorieren.</p>
                </td></tr>
              </table>

            </td>
          </tr>
        </table>

      </td>
    </tr>

    <!-- Footer -->
    <tr>
      <td align="center" style="padding:24px 0 0;">
        <p style="margin:0 0 4px;font-size:11px;color:#3a3a3a;letter-spacing:2px;text-transform:uppercase;font-weight:700;">EAT THIS</p>
        <p style="margin:0;font-size:11px;color:#444;">
          <a href="https://www.eatthisdot.com" style="color:#444;text-decoration:none;">eatthisdot.com</a>
          &nbsp;·&nbsp;Berlin
        </p>
      </td>
    </tr>

  </table>

</td></tr>
</table>

</body>
</html>
